<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Panha Network MikroTik Dashboard</title>
  <link rel="stylesheet" href="/css/style.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js" defer></script>
  <script src="/js/login.js" defer></script>
</head>
<body>

<div id="login-screen">
  <div class="login-card fade-up" id="login-card">

    <!-- Panha Network Logo -->
    <div class="flex items-center gap-3 mb-7" style="display:flex;align-items:center;gap:12px;margin-bottom:28px;">
      <img
        src="/logo_panha.png"
        alt="Panha Network"
        style="height:60px;width:auto;"
      />
    </div>

    <h1 style="font-size:1.2rem;font-weight:600;color:#fff;margin-bottom:4px;">MikroTik Dashboard</h1>
    <p style="color:var(--muted);font-size:.85rem;margin-bottom:1.5rem;">Login dengan akun administrator</p>

    <div id="login-error" style="display:none;margin-bottom:16px;padding:12px 16px;border-radius:10px;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);color:#f87171;font-size:.82rem;"></div>

    <form id="login-form">

      <!-- Username -->
      <div style="margin-bottom:16px;">
        <label style="display:block;font-size:.72rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px;">
          Username
        </label>
        <input
          id="f-user"
          class="dash-input"
          type="text"
          placeholder="admin"
          autocomplete="username"
          required
        />
      </div>

      <!-- Password -->
      <div style="margin-bottom:24px;">
        <label style="display:block;font-size:.72rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px;">
          Password
        </label>
        <input
          id="f-pass"
          class="dash-input"
          type="password"
          placeholder="••••••••"
          autocomplete="current-password"
          required
        />
      </div>

      <button id="login-btn" class="btn-primary" type="submit">
        <span id="login-label">Masuk ke Dashboard</span>
        <span id="login-spinner" style="display:none;">
          <span class="spinner" style="width:16px;height:16px;border-width:2px;vertical-align:-3px;margin-right:6px;display:inline-block;"></span>
          Menghubungkan…
        </span>
      </button>
    </form>

    <p style="font-size:.72rem;color:var(--muted);text-align:center;margin-top:20px;">
      © 2026 <span style="color:var(--accent);font-weight:600;">Panha Network</span> — MikroTik Dashboard
    </p>

  </div>
</div>

</body>
</html>
