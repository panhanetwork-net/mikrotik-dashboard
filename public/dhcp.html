<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DHCP Leases — Panha Network MikroTik</title>
  <link rel="stylesheet" href="/css/style.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="/js/dhcp.js" defer></script>
</head>
<body>

<div class="app-layout">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <img src="/logo_panha.png" alt="Panha Network" />
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section-label">Monitor</div>
      <a href="/dashboard" class="nav-item">
        <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        Dashboard
      </a>
      <a href="/dhcp" class="nav-item active">
        <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6M9 16h6M7 4H5a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2V6a2 2 0 00-2-2h-2M9 4a2 2 0 014 0"/></svg>
        DHCP Leases
      </a>
      <a href="/connections" class="nav-item">
        <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
        Koneksi Aktif
      </a>
    </nav>
    <div class="sidebar-footer">
      <button onclick="doLogout()" class="btn-secondary" style="justify-content:flex-start;gap:8px;display:flex;align-items:center;">
        <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
        Keluar
      </button>
    </div>
  </aside>

  <!-- MAIN CONTENT AREA -->
  <div class="content-wrap">

    <header class="topbar px-5 py-3" style="display:flex;align-items:center;justify-content:space-between;">
      <div>
        <h1 style="font-size:.95rem;font-weight:600;color:#fff;">DHCP Leases</h1>
        <p style="font-size:.72rem;color:var(--muted);margin-top:1px;">Daftar klien yang mendapatkan IP dari DHCP server</p>
      </div>
      <div style="display:flex;align-items:center;gap:10px;">
        <input type="text" id="search-leases" class="search-input" placeholder="Cari IP, MAC, hostname…" oninput="filterLeases()" />
        <button onclick="loadLeases()" class="btn-secondary">â†» Refresh</button>
      </div>
    </header>

    <main style="padding:24px;">

      <!-- Stats row -->
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:20px;">
        <div class="dash-card fade-up">
          <p style="font-size:.68rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px;">Total Leases</p>
          <span id="dhcp-total" style="font-size:2rem;font-weight:700;color:#fff;">0</span>
        </div>
        <div class="dash-card fade-up">
          <p style="font-size:.68rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px;">Active</p>
          <span id="dhcp-active" style="font-size:2rem;font-weight:700;color:#22c55e;">0</span>
        </div>
        <div class="dash-card fade-up">
          <p style="font-size:.68rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px;">Waiting</p>
          <span id="dhcp-waiting" style="font-size:2rem;font-weight:700;color:#f59e0b;">0</span>
        </div>
        <div class="dash-card fade-up">
          <p style="font-size:.68rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px;">Expired</p>
          <span id="dhcp-expired" style="font-size:2rem;font-weight:700;color:var(--muted);">0</span>
        </div>
      </div>

      <!-- Leases Table -->
      <div class="dash-card fade-up">
        <div style="overflow-x:auto;border-radius:12px;border:1px solid rgba(30,37,52,.5);">
          <table class="dash-table">
            <thead>
              <tr>
                <th>IP Address</th>
                <th>MAC Address</th>
                <th>Hostname</th>
                <th>Server</th>
                <th>Status</th>
                <th>Expires After</th>
              </tr>
            </thead>
            <tbody id="dhcp-tbody">
              <tr><td colspan="6" style="text-align:center;color:var(--muted);padding:40px;">
                <span class="spinner"></span> Memuat data DHCP…
              </td></tr>
            </tbody>
          </table>
        </div>
      </div>

      <div style="margin-top:20px;font-size:.72rem;color:var(--muted);">© 2026 <span style="color:#3b82f6;font-weight:600;">Panha Network</span> — MikroTik Dashboard</div>
    </main>
  </div>
</div>

<div id="toast">âš  <span id="toast-msg">Error</span></div>

</body>
</html>
